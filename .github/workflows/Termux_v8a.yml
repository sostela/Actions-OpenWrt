
name: Build Termux for arm64-v8a

on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Clone Termux source code
      run: |
        git clone https://github.com/termux/termux-app.git
        cd termux-app

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Make Gradle wrapper executable
      run: |
        cd termux-app
        chmod +x ./gradlew

    - name: Build Release APK for arm64-v8a
      run: |
        cd termux-app
        ./gradlew assembleRelease -PabiFilter=arm64-v8a

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: termux-arm64-v8a-release
        path: termux-app/app/build/outputs/apk/release/app-arm64-v8a-release.apk
